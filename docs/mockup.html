<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>sc-site — hangar</title>

<script>
  // Catppuccin Mocha extended into Tailwind's theme so the markup below
  // can use class names like text-mauve, bg-mantle, border-surface0.
  tailwind = window.tailwind || {};
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Inter', 'system-ui', 'sans-serif'],
          mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
        },
        colors: {
          base:      '#1e1e2e',
          mantle:    '#181825',
          crust:     '#11111b',
          surface0:  '#313244',
          surface1:  '#45475a',
          surface2:  '#585b70',
          overlay0:  '#6c7086',
          subtext0:  '#a6adc8',
          subtext1:  '#bac2de',
          text:      '#cdd6f4',
          mauve:     '#cba6f7',
          sky:       '#89dceb',
          peach:     '#fab387',
          green:     '#a6e3a1',
          red:       '#f38ba8',
        },
      },
    },
  };
</script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js"
  }
}
</script>

<style>
  html, body { background: #11111b; color: #cdd6f4; }
  body { font-feature-settings: "ss01", "cv11"; }
  /* Custom focus ring everywhere — 2px mauve, no offset on inputs */
  :focus-visible { outline: 2px solid #cba6f7; outline-offset: 1px; border-radius: 4px; }
  /* the ship name labels overlaid on the canvas */
  .ship-label {
    position: absolute;
    transform: translate(-50%, -100%);
    pointer-events: none;
    font-size: 11px;
    letter-spacing: 0.04em;
    color: #bac2de;
    text-align: center;
    line-height: 1.3;
    transition: opacity 220ms cubic-bezier(0.2, 0.8, 0.2, 1);
    white-space: nowrap;
  }
  .ship-label .name { color: #cdd6f4; font-weight: 600; }
  .ship-label .meta { color: #6c7086; font-size: 10px; }
  .ship-label .underline {
    margin: 4px auto 0;
    width: 18px; height: 1px; background: #cba6f7; opacity: 0.6;
  }
  /* hairline that appears at the top of focused panels */
  .panel-hairline {
    background: linear-gradient(90deg, transparent, rgba(203,166,247,0.55), transparent);
    height: 1px;
  }
</style>
</head>
<body class="font-sans antialiased overflow-hidden">

<!-- ─── full-bleed three.js canvas ────────────────────────────────────── -->
<canvas id="hangar" class="fixed inset-0 block w-full h-full"></canvas>

<!-- labels for each ship, positioned in JS via vector3.project() -->
<div id="labels" class="fixed inset-0 pointer-events-none"></div>

<!-- ─── search bar (dual-mode: ship name OR full question) ────────────── -->
<div class="fixed top-10 left-1/2 -translate-x-1/2 w-[520px] max-w-[calc(100vw-3rem)]">
  <div class="relative">
    <div class="panel-hairline absolute inset-x-6 -top-px"></div>
    <input
      type="text"
      placeholder="ship name, or: quantum tank ≥ 50k, STV-capable, buy @ orison"
      class="w-full bg-mantle/70 backdrop-blur-md border border-surface0
             rounded-md px-5 py-3 text-[14px] text-text placeholder:text-overlay0
             focus:border-surface1 focus:bg-mantle/90 transition-colors duration-200" />
  </div>
</div>

<!-- ─── query rail: cross-source filter chips ─────────────────────────── -->
<!-- Each chip carries a tiny coloured dot + 2-letter source badge so the  -->
<!-- user sees at a glance which data source backs the constraint. This is -->
<!-- the site's spine (§5 in MOCKUP.md).                                    -->
<div class="fixed top-28 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2">
  <div class="flex items-center gap-1.5 flex-wrap justify-center">
    <span class="flex items-center gap-2 pl-2.5 pr-3 py-1.5 text-[12px] text-mauve border border-mauve/50 bg-mauve/[0.06] rounded-md">
      <span class="w-1 h-1 rounded-full bg-peach"></span>
      <span class="text-overlay0 text-[9px] font-mono">SP</span>
      <span>quantum tank ≥ 50k</span>
      <span class="text-overlay0 ml-1 hover:text-text cursor-pointer">×</span>
    </span>
    <span class="flex items-center gap-2 pl-2.5 pr-3 py-1.5 text-[12px] text-mauve border border-mauve/50 bg-mauve/[0.06] rounded-md">
      <span class="w-1 h-1 rounded-full bg-sky"></span>
      <span class="text-overlay0 text-[9px] font-mono">FY</span>
      <span>STV-capable</span>
      <span class="text-overlay0 ml-1 hover:text-text cursor-pointer">×</span>
    </span>
    <span class="flex items-center gap-2 pl-2.5 pr-3 py-1.5 text-[12px] text-mauve border border-mauve/50 bg-mauve/[0.06] rounded-md">
      <span class="w-1 h-1 rounded-full bg-green"></span>
      <span class="text-overlay0 text-[9px] font-mono">CS</span>
      <span>buyable @ orison</span>
      <span class="text-overlay0 ml-1 hover:text-text cursor-pointer">×</span>
    </span>
    <span class="flex items-center gap-2 pl-2.5 pr-3 py-1.5 text-[12px] text-mauve border border-mauve/50 bg-mauve/[0.06] rounded-md">
      <span class="w-1 h-1 rounded-full bg-mauve"></span>
      <span class="text-overlay0 text-[9px] font-mono">UEX</span>
      <span>≤ 1M aUEC</span>
      <span class="text-overlay0 ml-1 hover:text-text cursor-pointer">×</span>
    </span>
    <button class="px-3 py-1.5 text-[12px] text-subtext0 border border-dashed border-surface0 hover:border-surface1 hover:text-text rounded-md transition-colors duration-200">
      + add
    </button>
  </div>
  <div class="text-[10px] tracking-[0.08em] text-subtext0">
    <span class="text-text font-semibold">4</span> MATCH <span class="text-overlay0 ml-1">· save · share</span>
  </div>
</div>

<!-- ─── bottom-left hint ──────────────────────────────────────────────── -->
<div class="fixed bottom-8 left-10 text-[10px] tracking-[0.06em] text-overlay0 select-none">
  4 OF 6 SHIPS MATCH · DRAG TO PAN · SCROLL TO DOLLY · CLICK TO INSPECT
</div>

<!-- ─── bottom-right text nav (the entire menu) ───────────────────────── -->
<nav class="fixed bottom-8 right-10 flex items-center gap-5 text-[12px] text-subtext0 select-none">
  <a href="#" class="text-mauve">hangar</a>
  <a href="#" class="hover:text-text transition-colors duration-200">map</a>
  <a href="#" class="hover:text-text transition-colors duration-200">trade</a>
  <a href="#" class="hover:text-text transition-colors duration-200">mining</a>
  <a href="#" class="hover:text-text transition-colors duration-200">weapons</a>
  <a href="#" class="hover:text-text transition-colors duration-200">components</a>
</nav>

<!-- ─── bottom-right cmd-K hint ───────────────────────────────────────── -->
<div class="fixed top-10 right-10 flex items-center gap-2 text-[10px] tracking-[0.06em] text-overlay0">
  <span>jump to</span>
  <kbd class="px-1.5 py-0.5 text-[10px] border border-surface0 rounded text-subtext0">⌘ K</kbd>
</div>

<script type="module">
import * as THREE from 'three';

// ─── ship roster (placeholder until real GLBs are wired up) ──────────
// Each "ship" here is a small composition of primitives sized roughly to
// real SC ships' relative scale. The hangar is wide and they're spaced
// along x. In production these are GLB loads via GLTFLoader+DRACO.
const SHIPS = [
  { slug: 'aurora-mr',     name: 'AURORA MR',     mfr: 'RSI',   scale: 0.7,  color: 0xcba6f7, x: -22 },
  { slug: 'avenger',       name: 'AVENGER TITAN', mfr: 'AEGIS', scale: 0.95, color: 0xb4befe, x: -13 },
  { slug: 'cutlass-black', name: 'CUTLASS BLACK', mfr: 'DRAKE', scale: 1.4,  color: 0xcba6f7, x:  -2 },
  { slug: 'freelancer',    name: 'FREELANCER',    mfr: 'MISC',  scale: 1.2,  color: 0x89dceb, x:   9 },
  { slug: 'constellation', name: 'CONSTELLATION', mfr: 'RSI',   scale: 1.7,  color: 0xcba6f7, x:  20 },
  { slug: 'carrack',       name: 'CARRACK',       mfr: 'ANVIL', scale: 2.3,  color: 0xb4befe, x:  35 },
];

const canvas = document.getElementById('hangar');
const labelsRoot = document.getElementById('labels');

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight, false);
renderer.setClearColor(0x11111b, 1);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x11111b, 30, 90);

const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 300);
camera.position.set(0, 6, 28);
camera.lookAt(0, 1, 0);

// ─── lighting: dark, mauve dominant, sky rim ──────────────────────────
scene.add(new THREE.AmbientLight(0xcba6f7, 0.12));

const ceilingLight1 = new THREE.PointLight(0xcba6f7, 60, 50, 1.6);
ceilingLight1.position.set(-15, 9, 4);
scene.add(ceilingLight1);

const ceilingLight2 = new THREE.PointLight(0xcba6f7, 70, 60, 1.6);
ceilingLight2.position.set(10, 9, 4);
scene.add(ceilingLight2);

const ceilingLight3 = new THREE.PointLight(0x89dceb, 30, 60, 1.8);
ceilingLight3.position.set(28, 8, -6);
scene.add(ceilingLight3);

const rimLight = new THREE.DirectionalLight(0x89dceb, 0.25);
rimLight.position.set(-10, 4, -8);
scene.add(rimLight);

// ─── hangar architecture ──────────────────────────────────────────────
// Floor: large polished plane that catches the mauve point lights.
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x181825, metalness: 0.9, roughness: 0.42,
});
const floor = new THREE.Mesh(new THREE.PlaneGeometry(220, 70), floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -2;
scene.add(floor);

// Floor grid lines — extremely subtle.
const grid = new THREE.GridHelper(220, 44, 0x313244, 0x1e1e2e);
grid.position.y = -1.999;
const gMat = grid.material;
if (Array.isArray(gMat)) gMat.forEach(m => { m.transparent = true; m.opacity = 0.18; });
else { gMat.transparent = true; gMat.opacity = 0.18; }
scene.add(grid);

// Pillars along the back of the hangar — instanced for cheap repeats.
const pillarGeo = new THREE.BoxGeometry(1.4, 14, 1.4);
const pillarMat = new THREE.MeshStandardMaterial({
  color: 0x11111b, metalness: 0.6, roughness: 0.5,
});
const pillarCount = 10;
const pillars = new THREE.InstancedMesh(pillarGeo, pillarMat, pillarCount);
const dummy = new THREE.Object3D();
for (let i = 0; i < pillarCount; i++) {
  dummy.position.set(-45 + i * 10, 5, -16);
  dummy.updateMatrix();
  pillars.setMatrixAt(i, dummy.matrix);
}
scene.add(pillars);

// Ceiling cable strip — thin lines high above.
const cableGeo = new THREE.BufferGeometry().setFromPoints([
  new THREE.Vector3(-60, 11, 0), new THREE.Vector3(60, 11, 0),
]);
const cableMat = new THREE.LineBasicMaterial({ color: 0x313244, transparent: true, opacity: 0.6 });
scene.add(new THREE.Line(cableGeo, cableMat));
const cableGeo2 = new THREE.BufferGeometry().setFromPoints([
  new THREE.Vector3(-60, 11, -4), new THREE.Vector3(60, 11, -4),
]);
scene.add(new THREE.Line(cableGeo2, cableMat));

// ─── build placeholder ships ──────────────────────────────────────────
// Each "ship" is a small group of primitives so it reads as a vehicle
// silhouette. In production this whole function is replaced by a
// GLTFLoader call against ships/{slug}.glb.
function buildPlaceholderShip(spec) {
  const group = new THREE.Group();
  const bodyMat = new THREE.MeshStandardMaterial({
    color: 0x313244, metalness: 0.55, roughness: 0.45,
    emissive: spec.color, emissiveIntensity: 0.04,
  });
  const accentMat = new THREE.MeshStandardMaterial({
    color: 0x45475a, metalness: 0.7, roughness: 0.4,
  });

  // hull
  const hull = new THREE.Mesh(new THREE.BoxGeometry(5.4, 1.1, 2.0), bodyMat);
  group.add(hull);

  // cockpit nose — wedge
  const nose = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.7, 1.4), bodyMat);
  nose.position.set(-3.0, 0.25, 0);
  group.add(nose);

  // wings — flat slabs
  const wing = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.12, 4.0), accentMat);
  wing.position.set(0.6, -0.1, 0);
  group.add(wing);

  // engines (3 cylinders at the back)
  const engGeo = new THREE.CylinderGeometry(0.32, 0.32, 0.9, 12);
  const eng1 = new THREE.Mesh(engGeo, accentMat);
  eng1.rotation.z = Math.PI / 2;
  eng1.position.set(3.0, 0.3, 0.9);
  group.add(eng1);
  const eng2 = eng1.clone(); eng2.position.set(3.0, 0.3, -0.9); group.add(eng2);
  const eng3 = eng1.clone(); eng3.position.set(3.0, -0.4, 0); group.add(eng3);

  // engine glow plane
  const glowMat = new THREE.MeshBasicMaterial({
    color: spec.color, transparent: true, opacity: 0.55,
  });
  const glow = new THREE.Mesh(new THREE.CircleGeometry(0.22, 12), glowMat);
  glow.position.set(3.5, 0.3, 0.9); glow.rotation.y = Math.PI / 2;
  group.add(glow);
  const glow2 = glow.clone(); glow2.position.set(3.5, 0.3, -0.9); group.add(glow2);
  const glow3 = glow.clone(); glow3.position.set(3.5, -0.4, 0); group.add(glow3);

  // mauve thin-edge overlay — the unmistakable "spec sketch" look
  const edges = new THREE.EdgesGeometry(hull.geometry, 18);
  const lineMat = new THREE.LineBasicMaterial({
    color: 0xcba6f7, transparent: true, opacity: 0.32,
  });
  group.add(new THREE.LineSegments(edges, lineMat));

  group.scale.setScalar(spec.scale);
  group.position.set(spec.x, 0.2 + spec.scale * 0.3, 0);
  // a slight pose so they're not all facing dead-on
  group.rotation.y = -0.35 + (spec.x * 0.005);
  return group;
}

const shipMeshes = SHIPS.map(spec => {
  const m = buildPlaceholderShip(spec);
  scene.add(m);
  return { spec, group: m };
});

// ─── DOM labels for each ship — positioned each frame via project() ──
const labelEls = SHIPS.map(spec => {
  const el = document.createElement('div');
  el.className = 'ship-label';
  el.innerHTML = `
    <div class="meta">${spec.mfr}</div>
    <div class="name">${spec.name}</div>
    <div class="underline"></div>
  `;
  labelsRoot.appendChild(el);
  return el;
});

// ─── camera drift + drag-to-pan ───────────────────────────────────────
const driftCenter = new THREE.Vector3(0, 1, 0);
let camOffsetX = 0;     // user-driven pan
let camOffsetXTarget = 0;
let camDistance = 28;
let camDistanceTarget = 28;

let isDragging = false;
let dragStartX = 0;
let dragStartOffset = 0;

canvas.addEventListener('pointerdown', (e) => {
  isDragging = true;
  dragStartX = e.clientX;
  dragStartOffset = camOffsetXTarget;
  canvas.style.cursor = 'grabbing';
});
window.addEventListener('pointerup', () => {
  isDragging = false;
  canvas.style.cursor = 'grab';
});
window.addEventListener('pointermove', (e) => {
  if (!isDragging) return;
  const dx = (e.clientX - dragStartX) / window.innerWidth;
  camOffsetXTarget = dragStartOffset - dx * 60;
  camOffsetXTarget = Math.max(-28, Math.min(38, camOffsetXTarget));
});
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  camDistanceTarget = Math.max(14, Math.min(48, camDistanceTarget + e.deltaY * 0.02));
}, { passive: false });
canvas.style.cursor = 'grab';

// ─── render loop ──────────────────────────────────────────────────────
const tmpVec = new THREE.Vector3();
const t0 = performance.now();

function frame() {
  const t = (performance.now() - t0) * 0.001;

  // Smooth pan & zoom toward targets
  camOffsetX += (camOffsetXTarget - camOffsetX) * 0.08;
  camDistance += (camDistanceTarget - camDistance) * 0.08;

  // Idle camera drift — a slow lateral sway over 18s
  const idleSway = Math.sin(t * 0.18) * 1.2;

  camera.position.x = camOffsetX + idleSway;
  camera.position.y = 6 + Math.sin(t * 0.22) * 0.25;
  camera.position.z = camDistance;
  camera.lookAt(camOffsetX + idleSway * 0.4, 1.5, 0);

  // Tiny per-ship sway so the hangar breathes
  for (let i = 0; i < shipMeshes.length; i++) {
    const { group } = shipMeshes[i];
    group.position.y = 0.2 + shipMeshes[i].spec.scale * 0.3 + Math.sin(t * 0.5 + i) * 0.06;
    group.rotation.y += 0.0006;
  }

  // Project each ship's world position into screen-space for the labels
  for (let i = 0; i < shipMeshes.length; i++) {
    const { group } = shipMeshes[i];
    tmpVec.copy(group.position);
    tmpVec.y += 1.6 * shipMeshes[i].spec.scale + 0.6;
    tmpVec.project(camera);
    const sx = (tmpVec.x * 0.5 + 0.5) * window.innerWidth;
    const sy = (-tmpVec.y * 0.5 + 0.5) * window.innerHeight;
    const inFront = tmpVec.z < 1;
    const el = labelEls[i];
    el.style.left = `${sx}px`;
    el.style.top  = `${sy}px`;
    el.style.opacity = inFront ? '1' : '0';
  }

  renderer.render(scene, camera);
  requestAnimationFrame(frame);
}
frame();

// ─── resize ───────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight, false);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>
</body>
</html>
