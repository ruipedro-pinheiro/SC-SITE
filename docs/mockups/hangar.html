<!-- MUST sit above the <script src="…tailwindcss.com"> line. Keep in sync -->
<!-- with tokens.css §10 whenever a token value changes.                    -->
<script>
  window.tailwind = window.tailwind || {};
  window.tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans:    ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          mono:    ['"JetBrains Mono"', 'ui-monospace', 'SF Mono', 'Menlo', 'monospace'],
          display: ['Orbitron', 'Inter', 'ui-sans-serif', 'sans-serif'],
        },
        colors: {
          base:      '#1e1e2e',
          mantle:    '#181825',
          crust:     '#11111b',
          surface0:  '#313244',
          surface1:  '#45475a',
          surface2:  '#585b70',
          overlay0:  '#6c7086',
          overlay1:  '#7f849c',
          subtext0:  '#a6adc8',
          subtext1:  '#bac2de',
          text:      '#cdd6f4',
          mauve:     '#cba6f7',
          sky:       '#89dceb',
          peach:     '#fab387',
          green:     '#a6e3a1',
          red:       '#f38ba8',

          yellow:    '#f9e2af',
        },
        borderRadius: {

        },
        letterSpacing: {

          label:  '0.04em',

        transitionDuration: {
          '120': '120ms', '180': '180ms', '220': '220ms',
          '400': '400ms', '600': '600ms', '900': '900ms',
        },
        transitionTimingFunction: {
          deliberate: 'cubic-bezier(0.2, 0.8, 0.2, 1)',

    />

<!-- ═══ three.js scene ═══════════════════════════════════════════════════ -->
<script type="module">
import * as THREE from 'three';

/* ─── ship roster — real SC ships at real relative scale ────────────────
   Dimensions are from the RSI ship matrix (length in metres), rounded.
   `scale` is relative to an eye-baseline where a Cutlass Black (38 m)
   is ~1.4 so that the Aurora reads as tiny and the Polaris reads as huge.
   `x` positions the ship along the hangar deck (world-space metres).
   The four ships that MATCH the query rail above are marked `matching:
   true` — the other two are mid-reflow: their meshes drift 8 world
   units up out of frame, opacity drops to 0.25, the mauve EdgesGeometry
   overlay is dropped, and their DOM labels are stripped, so the still
   frame physicalises §3's "cross-source query as a reflow of the room"
   without animating it. */
const SHIPS = [
  { slug: 'aurora-mr',     name: 'AURORA MR',          mfr: 'RSI',   length: 18.5,  scale: 0.55, x: -26, matching: false, stat: null,          tint: 0xb4befe },
  { slug: 'cutlass-black', name: 'CUTLASS BLACK',      mfr: 'DRAKE', length: 38,    scale: 1.1,  x: -14, matching: false, stat: null,          tint: 0xcba6f7 },
  { slug: 'corsair',       name: 'CORSAIR',            mfr: 'DRAKE', length: 64.5,  scale: 1.55, x:  -2, matching: true,  stat: '61 k units',  tint: 0xcba6f7 },
  { slug: 'constellation-taurus', name: 'CONSTELLATION TAURUS', mfr: 'RSI', length: 69, scale: 1.65, x: 11, matching: true, stat: '58 k units', tint: 0xb4befe },
  { slug: 'carrack',       name: 'CARRACK',            mfr: 'ANVIL', length: 126.5, scale: 2.05, x:  26, matching: true,  stat: '74 k units',  tint: 0x89dceb },
  { slug: 'msr',           name: 'MSR',                mfr: 'CRUS',  length: 76,    scale: 1.7,  x:  41, matching: true,  stat: '52 k units',  tint: 0xb4befe },
];

const canvas      = document.getElementById('hangar');
const labelsRoot  = document.getElementById('labels');

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight, false);
renderer.setClearColor(0x11111b, 1);

const scene  = new THREE.Scene();
scene.fog    = new THREE.Fog(0x11111b, 34, 110);

const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 400);
camera.position.set(0, 6.5, 30);
camera.lookAt(0, 1.2, 0);

/* ─── lighting: mauve-dominant point lights, sky rim, low ambient ──────
   Matches MOCKUP.md §10 "hangar architecture" + §8 rule 2 (mauve primary
   light, sky secondary rim). Kept slightly dimmer than mockup.html so the
   Polaris-tier big ship doesn't wash out. */
scene.add(new THREE.AmbientLight(0xcba6f7, 0.1));

const ceilA = new THREE.PointLight(0xcba6f7, 65, 60, 1.6);
ceilA.position.set(-18, 10, 4); scene.add(ceilA);

const ceilB = new THREE.PointLight(0xcba6f7, 80, 70, 1.6);
ceilB.position.set(  8, 10, 4); scene.add(ceilB);

/* Sky-coloured rim point light along the back-right of the hangar.
   Dropped from intensity 35 → 12 in iteration 1: at 35 the rim was
   bright enough to read as a colour wash on the right-hand ships,
   competing with the dominant mauve. 12 is a quiet hint. */
const ceilC = new THREE.PointLight(0x89dceb, 12, 70, 1.8);
ceilC.position.set( 32,  9, -6); scene.add(ceilC);

const rim = new THREE.DirectionalLight(0x89dceb, 0.28);
rim.position.set(-10, 6, -8); scene.add(rim);

/* ─── hangar architecture: polished floor + pillars + ceiling cables ──── */
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x181825, metalness: 0.9, roughness: 0.4,
});
const floor = new THREE.Mesh(new THREE.PlaneGeometry(260, 80), floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -2;
scene.add(floor);

/* §10 calls for "polished metal floor reflecting mauve point lights",
   not a debug grid. The previous GridHelper read as a CAD reference
   plane and broke the "private hangar bay at 3 a.m." mood. The floor's
   metalness 0.9 + roughness 0.4 + the three ceiling point lights do
   the scale-reading job by reflection alone. */

/* instanced pillars along the back of the hangar */
const pillarGeo = new THREE.BoxGeometry(1.4, 14, 1.4);
const pillarMat = new THREE.MeshStandardMaterial({
  color: 0x11111b, metalness: 0.6, roughness: 0.5,
});
const pillarCount = 12;
const pillars = new THREE.InstancedMesh(pillarGeo, pillarMat, pillarCount);
const dummy = new THREE.Object3D();
for (let i = 0; i < pillarCount; i++) {
  dummy.position.set(-55 + i * 10, 5, -18);
  dummy.updateMatrix();
  pillars.setMatrixAt(i, dummy.matrix);
}
scene.add(pillars);

/* thin ceiling cable lines */
const cableMat = new THREE.LineBasicMaterial({ color: 0x313244, transparent: true, opacity: 0.55 });
for (const z of [0, -4, -8]) {
  const g = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-70, 11, z),
    new THREE.Vector3( 70, 11, z),
  ]);
  scene.add(new THREE.Line(g, cableMat));
}

/* ─── placeholder ship builder — the day-1 fallback (MOCKUP.md §10) ───
   Each ship is a small composition of primitives sized to the ship's
   real length. The mauve EdgesGeometry overlay (applied to *every*
   child mesh, per §9, not just the hull) gives the "spec sketch" look.

   §8 rule 5 — "no glows". The previous version stuck a MeshBasicMaterial
   disc behind each engine nozzle to fake a glow; that is exactly the
   "cheap cousin of light" the spec forbids. Real engines now read via a
   tiny PointLight at the nozzle position (intensity 0.3, distance 4):
   the surrounding accent material picks the light up and shows a real
   highlight. The hull/accent materials carry NO emissive contribution. */
function buildShip(spec) {
  const group = new THREE.Group();
  const matching = spec.matching;
  const opacity = matching ? 1.0 : 0.25;

  const bodyMat = new THREE.MeshStandardMaterial({
    color: 0x313244, metalness: 0.55, roughness: 0.45,
    emissive: 0x000000, emissiveIntensity: 0,
    transparent: !matching, opacity,
  });
  const accentMat = new THREE.MeshStandardMaterial({
    color: 0x45475a, metalness: 0.7, roughness: 0.4,
    emissive: 0x000000, emissiveIntensity: 0,
    transparent: !matching, opacity,
  });

  /* hull — the main fuselage */
  const hull = new THREE.Mesh(new THREE.BoxGeometry(5.4, 1.05, 2.0), bodyMat);
  group.add(hull);

  /* cockpit wedge */
  const nose = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.65, 1.35), bodyMat);
  nose.position.set(-3.0, 0.22, 0);
  group.add(nose);

  /* wings */
  const wing = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.12, 4.0), accentMat);
  wing.position.set(0.6, -0.1, 0);
  group.add(wing);

  /* engines — three nozzles, real lighting only */
  const engGeo = new THREE.CylinderGeometry(0.32, 0.32, 0.9, 12);
  const enginePositions = [
    [3.0,  0.30,  0.9],
    [3.0,  0.30, -0.9],
    [3.0, -0.38,  0  ],
  ];
  for (const [x, y, z] of enginePositions) {
    const e = new THREE.Mesh(engGeo, accentMat);
    e.rotation.z = Math.PI / 2;
    e.position.set(x, y, z);
    group.add(e);

    /* §8 rule 5 — engines read by reflected light, not glow stickers.
       A 0.3-intensity mauve point light at the nozzle picks out the
       accent metal around it. Distance 4 keeps the cone tight so it
       doesn't bleed onto neighbouring ships. Only on matching ships
       (non-matching ones are mid-reflow and read as background). */
    if (matching) {
      const nozzleLight = new THREE.PointLight(0xcba6f7, 0.3, 4, 2.0);
      nozzleLight.position.set(x + 0.55, y, z);
      group.add(nozzleLight);
    }
  }

  /* mauve edge overlay — applied to EVERY child mesh, not just the hull.
     §9: thin EdgesGeometry overlay on each ship gives the "spec sketch"
     signature. Walking children means wings, nose, and engines all get
     the same hairline treatment. Edges only render on matching ships;
     non-matching ones drop the overlay so the eye doesn't follow them. */
  if (matching) {
    const lineMat = new THREE.LineBasicMaterial({
      color: 0xcba6f7, transparent: true, opacity: 0.35,
    });
    /* snapshot the children list because we're about to mutate it */
    const meshChildren = group.children.filter(c => c.isMesh);
    for (const child of meshChildren) {
      const eg = new THREE.EdgesGeometry(child.geometry, 18);
      const ls = new THREE.LineSegments(eg, lineMat);
      ls.position.copy(child.position);
      ls.rotation.copy(child.rotation);
      ls.scale.copy(child.scale);
      group.add(ls);
    }
  }

  group.scale.setScalar(spec.scale);
  /* §3: non-matching ships are *leaving* — drift 8 world units up so
     the still-frame reads as "these are reflowing out", not "these are
     dimmed background props". Their label is also stripped (see below)
     so the eye binds the upward drift to "no longer in this query". */
  const baseY = 0.2 + spec.scale * 0.3;
  group.position.set(spec.x, matching ? baseY : baseY + 8, 0);
  group.rotation.y = -0.35 + (spec.x * 0.004);
  return group;
}

const shipMeshes = SHIPS.map(spec => {
  const m = buildShip(spec);
  scene.add(m);
  return { spec, group: m };
});

/* ─── DOM labels for each ship ──────────────────────────────────────────
   Built once, repositioned each frame via vector3.project().
   Non-matching ships are mid-reflow (drifting 8 world units up); the
   spec calls for them to drop their label entirely so the still-frame
   reads as "these are leaving". The label root for non-matching ships
   stays in the array as `null` so the per-frame projection loop knows
   to skip them. */
const labelEls = SHIPS.map(spec => {
  if (!spec.matching) return null;
  const el = document.createElement('div');
  el.className = 'ship-label';
  const statLine = spec.stat
    ? `<div class="stat">${spec.stat}</div>`
    : '';
  el.innerHTML = `
    <div class="meta">${spec.mfr}</div>
    <div class="name">${spec.name}</div>
    <div class="underline"></div>
    ${statLine}
  `;
  labelsRoot.appendChild(el);
  return el;
});

/* ─── drag-to-pan + scroll-to-dolly ──────────────────────────────────── */
let camOffsetX = 0;
let camOffsetXTarget = 0;
let camDistance = 30;
let camDistanceTarget = 30;

let isDragging = false;
let dragStartX = 0;
let dragStartOffset = 0;

canvas.addEventListener('pointerdown', (e) => {
  isDragging = true;
  dragStartX = e.clientX;
  dragStartOffset = camOffsetXTarget;
  canvas.style.cursor = 'grabbing';
});
window.addEventListener('pointerup', () => {
  isDragging = false;
  canvas.style.cursor = 'grab';
});
window.addEventListener('pointermove', (e) => {
  if (!isDragging) return;
  const dx = (e.clientX - dragStartX) / window.innerWidth;
  camOffsetXTarget = dragStartOffset - dx * 70;
  camOffsetXTarget = Math.max(-35, Math.min(45, camOffsetXTarget));
});
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  camDistanceTarget = Math.max(16, Math.min(52, camDistanceTarget + e.deltaY * 0.025));
}, { passive: false });
canvas.style.cursor = 'grab';

/* ─── render loop ──────────────────────────────────────────────────────
   Idle sway + per-ship breathing + label projection. `prefers-reduced-
   motion: reduce` disables the idle sway per MOCKUP.md §9. */
const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const tmp = new THREE.Vector3();
const t0 = performance.now();

function frame() {
  const t = (performance.now() - t0) * 0.001;

  camOffsetX   += (camOffsetXTarget - camOffsetX)   * 0.08;
  camDistance  += (camDistanceTarget - camDistance) * 0.08;

  /* §9: idle camera drift is a 0.06 rad/s yaw sway around the hangar
     deck centre. No lateral position bob, no y-axis bob, no per-ship
     rotation. The room is still; only the camera's *look angle*
     breathes. This is the "private hangar bay at 3 a.m." reading. */
  camera.position.x = camOffsetX;
  camera.position.y = 6.5;
  camera.position.z = camDistance;
  camera.lookAt(camOffsetX, 1.5, 0);
  camera.rotation.y += reduced ? 0 : Math.sin(t * 0.06) * 0.04;

  /* Ships are static in the wide overview. Per §3 the ship-level
     turntable rotation only kicks in when a ship is hero-posed (the
     ship-detail view). Here, no per-ship rotation, no per-ship bob —
     the previous "breathing" was contaminating the still-frame read. */

  /* project world → screen for the DOM labels (matching ships only) */
  for (let i = 0; i < shipMeshes.length; i++) {
    const el = labelEls[i];
    if (!el) continue; /* non-matching ships have no label */
    const { group, spec } = shipMeshes[i];
    tmp.copy(group.position);
    tmp.y += 1.7 * spec.scale + 0.6;
    tmp.project(camera);
    const sx = (tmp.x * 0.5 + 0.5) * window.innerWidth;
    const sy = (-tmp.y * 0.5 + 0.5) * window.innerHeight;
    const inFront = tmp.z < 1;
    el.style.left = `${sx}px`;
    el.style.top  = `${sy}px`;
    el.style.opacity = inFront ? '1' : '0';
  }

  renderer.render(scene, camera);
  requestAnimationFrame(frame);
}
frame();

/* ─── responsive resize ─────────────────────────────────────────────── */
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight, false);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>
</body>
